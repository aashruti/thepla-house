<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/thepla-house-design-system-website-2c40d59f-1114-4a72-bb72-17048b22af0a/styles.css">
</helmet>
<div style="position:relative; width:100%; height:100%; min-height:120px; overflow:hidden; background:linear-gradient(135deg, var(--gold-100), var(--cream-200)); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:18px; gap:10px;">
  <span style="position:absolute; top:10px; left:10px; display:inline-flex; align-items:center; gap:6px; background:rgba(255,253,249,0.82); color:var(--green-700); font-family:var(--font-body); font-size:0.6875rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:4px 9px; border-radius:999px;">
    <span style="width:9px; height:9px; border-radius:50%; border:2px solid var(--green-600); display:inline-block;"></span>Photo
  </span>
  <img src="assets/motifs/leaf-left.png" alt="" aria-hidden="true" style="position:absolute; bottom:-6px; right:-6px; width:74px; height:auto; opacity:0.28; transform:rotate(-12deg);">
  <span style="width:46px; height:46px; border-radius:50%; border:2px solid var(--green-600); display:flex; align-items:center; justify-content:center;">
    <span style="width:24px; height:24px; border-radius:50%; border:2px solid var(--gold-500); display:block;"></span>
  </span>
  <span style="font-family:var(--font-display); font-weight:600; color:var(--green-700); font-size:0.95rem; line-height:1.25; max-width:240px;">{{ subject }}</span>
  <span style="font-family:var(--font-body); font-style:italic; color:var(--ink-500); font-size:0.75rem; line-height:1.35; max-width:240px;">alt: {{ alt }}</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:190},&quot;subject&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Methi thepla on a brass plate&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;alt&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Stack of methi theplas&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
