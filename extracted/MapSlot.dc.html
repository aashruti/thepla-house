<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/thepla-house-design-system-website-2c40d59f-1114-4a72-bb72-17048b22af0a/styles.css">
</helmet>
<div style="position:relative; width:100%; height:100%; min-height:120px; overflow:hidden; background:linear-gradient(135deg, var(--green-50), var(--cream-200));">

  <span style="position:absolute; top:10px; left:10px; display:inline-flex; align-items:center; gap:6px; background:rgba(255,253,249,0.85); color:var(--green-700); font-family:var(--font-body); font-size:0.6875rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:4px 9px; border-radius:999px;"><span style="width:9px;height:9px;border-radius:50% 50% 50% 0;background:var(--green-600);transform:rotate(45deg);display:inline-block;"></span>Map</span>

  <span style="position:absolute; top:32%; left:24%; width:13px; height:13px; border-radius:50% 50% 50% 0; background:var(--green-600); transform:rotate(45deg); box-shadow:var(--shadow-sm);"></span>
  <span style="position:absolute; top:54%; left:40%; width:13px; height:13px; border-radius:50% 50% 50% 0; background:var(--green-600); transform:rotate(45deg); box-shadow:var(--shadow-sm);"></span>

  <span style="position:absolute; top:66%; left:70%; width:13px; height:13px; border-radius:50% 50% 50% 0; background:var(--green-600); transform:rotate(45deg); box-shadow:var(--shadow-sm);"></span>
