<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/thepla-house-design-system-website-2c40d59f-1114-4a72-bb72-17048b22af0a/styles.css">
</helmet>
<div style="display:flex; flex-direction:column; gap:10px; background:var(--color-surface-container); border:1px solid var(--color-outline-variant); border-radius:var(--radius-xl); box-shadow:var(--shadow-sm); padding:18px 18px 16px; height:100%;">
  <div style="display:flex; align-items:center; gap:8px;">
    <span style="width:30px; height:30px; border-radius:50%; background:var(--green-100); display:flex; align-items:center; justify-content:center;">
      <span style="width:10px; height:10px; border-radius:50% 50% 50% 0; background:var(--green-600); transform:rotate(45deg);"></span>
    </span>
    <span style="font-family:var(--font-body); font-size:0.6875rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--color-primary);">{{ area }}</span>
  </div>
  <h3 style="font-family:var(--font-display); color:var(--color-headline); font-size:1.25rem; line-height:1.2; margin:0;">{{ title }}</h3>
  <p style="font-family:var(--font-body); color:var(--color-on-surface-variant); font-size:0.875rem; line-height:1.5; margin:0; flex:1;">{{ note }}</p>
  <div style="display:flex; align-items:center; gap:7px; color:var(--ink-600); font-family:var(--font-body); font-size:0.8125rem;">
    <span style="width:14px; height:14px; border-radius:50%; border:1.5px solid var(--ink-400); position:relative; display:inline-block;"></span>{{ hours }}
  </div>
  <div style="display:flex; gap:8px; margin-top:4px;">
    <span style="flex:1; text-align:center; font-family:var(--font-body); font-size:0.8125rem; font-weight:600; color:var(--color-primary); border:1.5px solid var(--color-outline); border-radius:var(--radius-md); padding:9px 10px;">Directions</span>
    <span style="flex:1; text-align:center; font-family:var(--font-body); font-size:0.8125rem; font-weight:600; color:var(--color-on-primary); background:var(--color-primary); border-radius:var(--radius-md); padding:9px 10px;">Order</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:210},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Chandivali&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;area&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Andheri East&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;note&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Our flagship kitchen — full menu, catering and travel packs.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hours&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Mon–Sun · 9am–10pm&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
